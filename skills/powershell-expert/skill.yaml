name: powershell-expert
version: 1.0.0
description: Expert PowerShell scripting assistant with deep knowledge of cmdlets, modules, automation, and Windows administration
author: zerion-core
tags:
  - powershell
  - windows
  - automation
  - scripting
  - admin
  - devops

triggers:
  keywords:
    - powershell
    - pwsh
    - ps1
    - cmdlet
    - script
    - module
    - windows
    - iis
    - registry
    - service
    - scheduled-task
    - winget
    - chocolatey
    - nuget
    - active-directory
    - azure
    - dotnet
    - nuget
    - pester
  file_patterns:
    - "*.ps1"
    - "*.psm1"
    - "*.psd1"
    - "*.psrc"
    - "*.pssc"
  description_patterns:
    - "powershell"
    - "pwsh"
    - "windows script"
    - "ps1"
    - "cmdlet"

priority: 80
dependencies: []

tools:
  required:
    - read_file
    - write_file
    - edit_file
    - grep
    - bash
  optional:
    - glob
    - list_dir
  denied: []

permissions:
  - read_file
  - write_file
  - edit_file
  - grep
  - bash

memory:
  enabled: true
  max_entries: 500

rag:
  enabled: true
  docs_path: docs/
  chunk_size: 512
  top_k: 3

workflow:
  name: PowerShell Development Workflow
  steps:
    - inspect
    - analyze
    - plan
    - implement
    - test
    - verify
  auto_follow: true

auto_activate: true
project_aware: true
min_score: 0.5
